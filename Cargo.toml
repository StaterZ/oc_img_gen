[package]
name = "oc_img_gen"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5.45", features= ["derive"] }
color-print = "0.3.7"
deku = "0.19.1"
ffmpeg-next = "7.1.0"
humantime = "2.2.0"
indicatif = "0.18.0"
itertools = "0.14.0"
lazy_static = "1.5.0"
lodepng = { version = "3.12.1", optional = true }
more-asserts = "0.3.1"
num-traits = "0.2.19"
phf = { version = "0.12.1", features= ["macros"] }
stopwatch = "0.0.7"
szu = { version = "0.2.2", path = "../szu" }

[features]
default = []
debug-mode = ["lodepng"]

# https://stackoverflow.com/questions/60751806/how-to-compile-some-dependencies-with-release
[profile.dev.package."*"]
opt-level = 3

# [profile.dev]
# opt-level = 3

# [profile.release]
# debug = true
