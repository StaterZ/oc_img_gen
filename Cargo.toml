cargo-features = ["edition2024"]

[package]
name = "oc_img_gen"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5.21", features= ["derive"] }
color-print = "0.3.7"
itertools = "0.13.0"
lazy_static = "1.5.0"
lodepng = "3.10.7"
more-asserts = "0.3.1"
num-traits = "0.2.19"
phf = { version = "0.11.2", features= ["macros"] }
stopwatch = "0.0.7"
szu = { version = "0.2.2", path = "../szu" }

# https://stackoverflow.com/questions/60751806/how-to-compile-some-dependencies-with-release
[profile.dev.package."*"]
opt-level = 3

[profile.dev]
opt-level = 3

# [profile.release]
# debug = true
