[package]
name = "oc_img_gen"
version = "0.2.0"
edition = "2024"

[dependencies]
#cli & user feedback
clap = { version = "4.5.48", features= ["derive"] }
color-print = "0.3.7"
humantime = "2.3.0"
indicatif = "0.18.0"
stopwatch = "0.0.7"

#utilities
itertools = "0.14.0"
deku = "0.19.1"
lazy_static = "1.5.0"
num-traits = "0.2.19"
enum-as-inner = "0.6.1"
phf = { version = "0.13.1", features= ["macros"] }
lapjv = "0.3.0"
ndarray = "0.16.1"
num = "0.4.3"
rayon = "1.11.0"

#error handling
anyhow = "1.0.100"
thiserror = "2.0.17"
more-asserts = "0.3.1"

#loading
ffmpeg-next = { version = "8.0.0", features = ["software-resampling"] }
lodepng = { version = "3.12.1", optional = true }

#fourier
rustfft = "6"
realfft = "3"

#gpu
wgpu = { version = "27.0.1", optional = true }
bytemuck = { version = "1.24.0", optional = true }
futures = { version = "0.3.31", optional = true }
futures-intrusive = { version = "0.5.0", optional = true }

#custom
szu = { version = "0.2.2", path = "../szu" }

[features]
default = []
debug-mode = ["lodepng"]
gpu = ["wgpu", "bytemuck", "futures", "futures-intrusive"]

# https://stackoverflow.com/questions/60751806/how-to-compile-some-dependencies-with-release
[profile.dev.package."*"]
opt-level = 3

# [profile.dev]
# opt-level = 3

